name = "blt-timer"
main = "src/worker.py"
compatibility_date = "2024-12-02"
compatibility_flags = ["python_workers"]
workers_dev = true

[assets]
directory = "./public"

[env.production]
name = "fresh-time-tracker-prod"

# D1 database for data storage
[[d1_databases]]
binding = "DB"
database_name = "time_tracker"
database_id = "f0c8a598-a525-4923-8f9d-ec44a81b4c80"
migrations_dir = "migrations"
